<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctors - NeuroSense</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        .container-box {
            padding: 40px;
        }

        .doctor-card {
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
        }

        .doctor-card:hover {
            transform: translateY(-8px);
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 50px;
        }
    </style>
</head>

<body>

<div class="container container-box">

    <h2 class="text-center text-white mb-4">Available Doctors 👩‍⚕️👨‍⚕️</h2>

    <div class="row g-4">

        {% for doctor in doctors %}
        <div class="col-md-4">

            <div class="card doctor-card text-center shadow">

                <div class="icon text-primary mb-3">
                    <i class="bi bi-person-circle"></i>
                </div>

                <h5>{{ doctor[1] }}</h5>
                <p class="text-muted">{{ doctor[2] }}</p>

                <p><strong>Fees:</strong> ₹{{ doctor[3] }}</p>

                <a href="/book/{{ doctor[0] }}" class="btn btn-primary">
                    Book Appointment
                </a>

            </div>

        </div>
        {% endfor %}

    </div>

    <!-- Back -->
    <div class="text-center mt-4">
        <a href="/dashboard" class="btn btn-light">← Back to Dashboard</a>
    </div>

</div>

</body>
</html>
