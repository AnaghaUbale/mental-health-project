<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment - NeuroSense</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        .container-box {
            margin-top: 60px;
        }

        .card {
            border-radius: 15px;
            padding: 25px;
        }

        .btn-primary {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container container-box">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <h3 class="text-center mb-4">Book Appointment</h3>

                <!-- Doctor Info -->
                <div class="mb-4">
                    <h5>Doctor Details</h5>
                    <p><strong>Name:</strong> {{ doctor[1] }}</p>
                    <p><strong>Specialization:</strong> {{ doctor[2] }}</p>
                    <p><strong>Consultation Fees:</strong> ₹{{ doctor[3] }}</p>
                </div>

                <!-- Booking Form -->
                <form method="POST">

                    <div class="mb-3">
                        <label>Select Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Select Time</label>
                        <input type="time" name="time" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Confirm Booking
                    </button>

                </form>

                <!-- Back Button -->
                <div class="text-center mt-3">
                    <a href="/doctors">← Back to Doctors</a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
