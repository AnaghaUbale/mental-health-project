<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot - NeuroSense</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        .chat-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            max-width: 70%;
        }

        .user-msg {
            background: #6c63ff;
            color: white;
            margin-left: auto;
        }

        .bot-msg {
            background: #eaeaea;
        }

        .input-group input {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="chat-container shadow">

    <h4 class="text-center mb-3">AI Chatbot 🤖</h4>

    <!-- Chat Messages -->
    <div class="chat-box" id="chatBox"></div>

    <!-- Input -->
    <div class="input-group">
        <input type="text" id="messageInput" class="form-control" placeholder="Type your message...">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>

    <!-- Back -->
    <div class="text-center mt-3">
        <a href="/dashboard">← Back to Dashboard</a>
    </div>

</div>

<script>
    function sendMessage() {

        let input = document.getElementById("messageInput");
        let message = input.value.trim();

        if (message === "") return;

        let chatBox = document.getElementById("chatBox");

        // User message
        chatBox.innerHTML += `
            <div class="message user-msg">${message}</div>
        `;

        input.value = "";

        // Scroll down
        chatBox.scrollTop = chatBox.scrollHeight;

        // Send to backend
        fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        })
        .then(response => response.json())
        .then(data => {

            chatBox.innerHTML += `
                <div class="message bot-msg">${data.reply}</div>
            `;

            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }
</script>

</body>
</html>
